<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Challenge Arena</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Baseline Dynamic Custom Property Safe Guards */
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e1e38;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --panel-bg: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
            --neutral-btn: #475569;
            --blueprint: #6366f1;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        /* RESPONSIVE DESIGN CONTAINER ARCHITECTURE */
        .game-container {
            width: 100%;
            max-width: 540px; /* Default optimized vertical layout phone/tablet constraint */
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 24px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            box-sizing: border-box;
            transition: max-width 0.4s ease;
        }

        /* Scale container wide if playing matching matrix on laptop/desktops */
        .game-container.wide-mode {
            max-width: 950px;
        }

        .logo-header { max-width: 150px; max-height: 55px; object-fit: contain; margin: 0 auto 20px auto; display: block; }
        h1 { margin: 0 0 8px 0; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
        .subtitle { font-size: 0.95rem; opacity: 0.7; margin-bottom: 30px; }

        /* Login Registration View State Components */
        .setup-box input {
            padding: 16px; width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border);
            border-radius: 12px; color: white; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; text-align: center;
        }
        .setup-box input:focus { outline: none; border-color: var(--accent); }

        /* MULTI-COLUMN CROSS-PLATFORM RESPONSIVE MATRIX GRID */
        .matrix-layout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Absolute layout sync pairing row side-by-side */
            gap: 20px;
            margin: 25px 0;
            text-align: left;
        }
        .column-header { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.6; margin-bottom: 12px; padding-left: 5px; }

        #puzzle-list { margin: 25px 0; min-height: 100px; text-align: left; }

        .piece {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            padding: 16px 20px; border-radius: 14px; margin-bottom: 12px;
            cursor: grab; display: flex; align-items: center; gap: 14px;
            font-weight: 500; font-size: 0.95rem; line-height: 1.4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); box-sizing: border-box;
            transition: transform 0.2s, background-color 0.3s, border-color 0.3s;
        }
        .piece.fixed-anchor { cursor: default; background: rgba(255,255,255,0.02); border-style: dashed; opacity: 0.7; }
        .piece:not(.fixed-anchor):hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); }
        .sortable-ghost { opacity: 0.2; background: var(--accent) !important; }

        /* Global Structural Button System Elements */
        .controls { margin-top: 30px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        button { padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; font-family: inherit; transition: all 0.2s; }
        .primary-btn { background: var(--accent); color: white; width: 100%; }
        .submit-btn { background: var(--success); color: white; flex: 2; }
        .reset-btn { background: var(--neutral-btn); color: var(--text-main); flex: 1; }
        .reveal-btn { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.4); width: 100%; margin-top: 12px; display: none; }
        
        button:hover { transform: translateY(-1px); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }

        #result-message { margin-top: 30px; padding: 20px; border-radius: 14px; display: none; line-height: 1.6; font-size: 0.95rem; border: 1px solid transparent; }

        /* MOBILE OPTIMIZATION SCREEN OVERRIDES */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .game-container { padding: 25px 15px; border-radius: 16px; }
            h1 { font-size: 1.4rem; }
            .piece { padding: 12px 14px; font-size: 0.8rem; gap: 8px; border-radius: 10px; margin-bottom: 8px; min-height: 52px;}
            .matrix-layout-grid { gap: 10px; margin: 15px 0; }
            .column-header { font-size: 0.65rem; margin-bottom: 6px; }
            button { padding: 12px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="game-container" id="arenaContainer">
        <img id="gameLogo" class="logo-header" src="" alt="" style="display:none;">
        <h1 id="mainTitle">Challenge Arena</h1>
        <p class="subtitle" id="mainSub">Organize elements accurate to guidelines.</p>

        <div id="registrationFrame" class="setup-box">
            <input type="text" id="participantName" placeholder="Enter Team Name / Number">
            <button class="primary-btn" onclick="launchChallengeGameplay()">Begin Challenge</button>
        </div>

        <div id="gameplayFrame" style="display:none;">
            
            <div id="sequenceWrapper">
                <div id="puzzle-list"></div>
            </div>

            <div id="matchingWrapper" class="matrix-layout-grid" style="display:none;">
                <div>
                    <div class="column-header">Permanent Anchors</div>
                    <div id="leftAnchorColumn"></div>
                </div>
                <div>
                    <div class="column-header">Draggable Matches</div>
                    <div id="rightDraggableColumn"></div>
                </div>
            </div>

            <div class="controls">
                <button id="resetBtn" class="reset-btn" onclick="triggerSessionReset()">Reset</button>
                <button id="submitBtn" class="submit-btn" onclick="gradeParticipantSubmission()">Submit Challenge</button>
                <button id="revealBtn" class="reveal-btn" onclick="renderCorrectSequenceBlueprint()">Show Answer Guide Blueprint</button>
            </div>
            
            <div id="result-message"></div>
        </div>
    </div>

    <script>
        let gameLocked = false;
        let config = null;
        let parsedDataset = [];
        let sortInstance = null;

        // Auto parsing loop lifecycle triggers immediately upon initialization boot hook updates
        (() => {
            const params = new URLSearchParams(window.location.search);
            const rawPayload = params.get('p');
            if(!rawPayload) {
                document.getElementById('arenaContainer').innerHTML = "<h2>Configuration Error Context</h2><p>No valid gameplay data matrix parameters detected inside trace links.</p>";
                return;
            }

            try {
                // Safely decode packed Base64 payload configuration models parameters
                config = JSON.parse(decodeURIComponent(escape(atob(rawPayload))));
                
                // Set custom styles and variables based on decoded object
                document.body.style.fontFamily = config.f;
                const root = document.documentElement;
                root.style.setProperty('--bg-start', config.c1);
                root.style.setProperty('--bg-end', config.c2);
                root.style.setProperty('--accent', config.ca);
                root.style.setProperty('--text-main', config.ct);

                // Inject Custom Logo
                if(config.l) {
                    const logoImg = document.getElementById('gameLogo');
                    logoImg.src = config.l;
                    logoImg.style.display = 'block';
                }

                // Compile Game Titles Text Metrics Strings
                if(config.m === "sequence") {
                    document.getElementById('mainTitle').innerText = "Sequence Challenge";
                    document.getElementById('mainSub').innerText = "Reorder the stages into their correct tactical pipeline order.";
                } else {
                    document.getElementById('mainTitle').innerText = "Matrix Matching Matrix";
                    document.getElementById('mainSub').innerText = "Drag and align right-side entries to match their accurate permanent anchors.";
                }

                // Generate active dataset array matrices elements
                parsedDataset = config.d.split('\n').map(line => {
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        return { id: parts[0].trim(), text: parts.slice(1).join(',').trim() };
                    }
                    return null;
                }).filter(item => item !== null);

            } catch (err) {
                console.error(err);
                document.getElementById('arenaContainer').innerHTML = "<h2>Payload Damage Error</h2><p>Failed to unpack training module variables string securely.</p>";
            }
        })();

        function launchChallengeGameplay() {
            const identifier = document.getElementById('participantName').value.trim();
            if(!identifier) { alert("Please provide a team identifier name before continuing."); return; }

            document.getElementById('registrationFrame').style.display = 'none';
            document.getElementById('gameplayFrame').style.display = 'block';

            if(config.m === "sequence") {
                buildSequenceArena();
            } else {
                buildMatchingMatrixArena();
            }
            lucide.createIcons();
        }

        function buildSequenceArena() {
            const list = document.getElementById('puzzle-list');
            list.innerHTML = '';
            
            let shuffled = [...parsedDataset].sort(() => Math.random() - 0.5);
            shuffled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'piece';
                div.setAttribute('data-id', item.id);
                div.innerHTML = `<i data-lucide="layers" style="color:var(--accent); width:18px;"></i> <span>${item.text}</span>`;
                list.appendChild(div);
            });

            sortInstance = new Sortable(list, {
                animation: 250, ghostClass: 'sortable-ghost',
                onStart: function() { if(gameLocked) return false; }
            });
        }

        function buildMatchingMatrixArena() {
            // Apply fluid wide scaling adjustments across wide screens
            document.getElementById('arenaContainer').classList.add('wide-mode');
            document.getElementById('sequenceWrapper').style.display = 'none';
            document.getElementById('matchingWrapper').style.display = 'grid';

            const anchorCol = document.getElementById('leftAnchorColumn');
            const dragCol = document.getElementById('rightDraggableColumn');
            anchorCol.innerHTML = '';
            dragCol.innerHTML = '';

            // 1. Build unchanging left-side reference anchors
            parsedDataset.forEach(item => {
                const div = document.createElement('div');
                div.className = 'piece fixed-anchor';
                div.innerHTML = `<span>${item.id}</span>`;
                anchorCol.appendChild(div);
            });

            // 2. Build shuffled right-side reorderable definitions
            let shuffledAnswers = [...parsedDataset].sort(() => Math.random() - 0.5);
            shuffledAnswers.forEach(item => {
                const div = document.createElement('div');
                div.className = 'piece';
                div.setAttribute('data-id', item.id);
                div.innerHTML = `<i data-lucide="move" style="color:var(--accent); width:16px;"></i> <span>${item.text}</span>`;
                dragCol.appendChild(div);
            });

            sortInstance = new Sortable(dragCol, {
                animation: 250, ghostClass: 'sortable-ghost',
                onStart: function() { if(gameLocked) return false; }
            });
        }

        function gradeParticipantSubmission() {
            if (gameLocked) return;
            gameLocked = true;

            const name = document.getElementById('participantName').value;
            let currentScore = 0;
            let maxScore = parsedDataset.length;

            if (config.m === "sequence") {
                const elements = Array.from(document.querySelectorAll('#puzzle-list .piece'));
                elements.forEach((piece, index) => {
                    const icon = piece.querySelector('i');
                    if(piece.getAttribute('data-id') === parsedDataset[index].id) {
                        currentScore++;
                        piece.style.backgroundColor = "rgba(16, 185, 129, 0.12)"; piece.style.borderColor = "var(--success)";
                        if(icon) icon.style.color = "var(--success)";
                    } else {
                        piece.style.backgroundColor = "rgba(239, 68, 68, 0.12)"; piece.style.borderColor = "var(--error)";
                        if(icon) icon.style.color = "var(--error)";
                    }
                });
            } else {
                const elements = Array.from(document.querySelectorAll('#rightDraggableColumn .piece'));
                elements.forEach((piece, index) => {
                    const icon = piece.querySelector('i');
                    if(piece.getAttribute('data-id') === parsedDataset[index].id) {
                        currentScore++;
                        piece.style.backgroundColor = "rgba(16, 185, 129, 0.12)"; piece.style.borderColor = "var(--success)";
                        if(icon) icon.style.color = "var(--success)";
                    } else {
                        piece.style.backgroundColor = "rgba(239, 68, 68, 0.12)"; piece.style.borderColor = "var(--error)";
                        if(icon) icon.style.color = "var(--error)";
                    }
                });
            }

            sortInstance.option("disabled", true);
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';

            const msg = document.getElementById('result-message');
            msg.style.display = 'block';

            if(currentScore === maxScore) {
                msg.style.backgroundColor = "rgba(16, 185, 129, 0.1)"; msg.style.borderColor = "rgba(16, 185, 129, 0.2)";
                msg.innerHTML = `<b style="color:var(--success)">Perfect ${currentScore}/${maxScore}!</b><br>Excellent job, ${name}! Your accuracy records have been dispatched.`;
            } else {
                msg.style.backgroundColor = "rgba(239, 68, 68, 0.1)"; msg.style.borderColor = "rgba(239, 68, 68, 0.2)";
                msg.innerHTML = `<b style="color:var(--error)">Score: ${currentScore}/${maxScore}</b><br>Some segments require revision. Click down to access blueprint metrics solution profiles.`;
                document.getElementById('revealBtn').style.display = 'block';
            }

            dispatchScoreTelemetry(name, `${currentScore}/${maxScore}`);
        }

        function renderCorrectSequenceBlueprint() {
            if(config.m === "sequence") {
                const container = document.getElementById('puzzle-list');
                container.innerHTML = '';
                parsedDataset.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'piece';
                    div.style.backgroundColor = "rgba(99, 102, 241, 0.12)"; div.style.borderColor = "var(--blueprint)";
                    div.innerHTML = `<i data-lucide="check-circle-2" style="color:var(--blueprint); width:18px;"></i> <span>${item.text}</span>`;
                    container.appendChild(div);
                });
            } else {
                const container = document.getElementById('rightDraggableColumn');
                container.innerHTML = '';
                parsedDataset.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'piece';
                    div.style.backgroundColor = "rgba(99, 102, 241, 0.12)"; div.style.borderColor = "var(--blueprint)";
                    div.innerHTML = `<i data-lucide="check-circle-2" style="color:var(--blueprint); width:18px;"></i> <span>${item.text}</span>`;
                    container.appendChild(div);
                });
            }
            document.getElementById('revealBtn').style.display = 'none';
            lucide.createIcons();
        }

        function triggerSessionReset() {
            gameLocked = false;
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').style.display = 'inline-block';
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('result-message').style.display = 'none';

            if(config.m === "sequence") {
                buildSequenceArena();
            } else {
                buildMatchingMatrixArena();
            }
            lucide.createIcons();
        }

        async function dispatchScoreTelemetry(team, metrics) {
            // Your internal connection parameter endpoints webhook strings mapping logic
            const scriptURL = "https://script.google.com/macros/s/AKfycby3J-PlUKb54PFpr8XYeqPXODZuoYqxUetbsL90z_QPkwb8oy0JZ1gWxR2IjDJPsSzv/exec"; 
            fetch(scriptURL, {
                method: 'POST', mode: 'no-cors', 
                body: JSON.stringify({ team: team, score: metrics })
            }).catch(err => console.error("Telemetry Logging Fault:", err));
        }
    </script>
</body>
</html>
