<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Puzzle</title>
    
    <!-- Framework Engine Scripts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1e38 100%);
            --panel-bg: rgba(255, 255, 255, 0.06);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --neutral-btn: #475569;
            --blueprint: #6366f1;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 580px;
            text-align: center;
            transition: max-width 0.4s ease;
            box-sizing: border-box;
        }

        .container.wide-layout { max-width: 960px; }

        h1 { margin: 0 0 8px 0; font-size: 2rem; font-weight: 700; letter-spacing: -0.025em; }
        .subtitle { color: var(--text-secondary); margin: 0 0 30px 0; font-size: 1rem; }
        .logo { max-width: 140px; max-height: 50px; object-fit: contain; margin: 0 auto 20px auto; display: none; }

        .setup-box input {
            padding: 16px; width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--panel-border); border-radius: 12px;
            margin-bottom: 20px; font-size: 1rem; color: var(--text-primary); font-family: inherit; box-sizing: border-box; text-align: center;
        }
        .setup-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2); }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 25px 0; text-align: left; }
        .column-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; margin-bottom: 12px; }

        .piece-list { min-height: 150px; }

        .piece {
            background: var(--panel-bg); color: var(--text-primary); margin: 12px 0; padding: 16px 20px;
            border-radius: 12px; cursor: grab; display: flex; align-items: center; position: relative;
            font-weight: 500; font-size: 0.95rem; border: 1px solid var(--panel-border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.4s, border-color 0.4s;
            word-break: break-word; line-height: 1.4;
        }
        .piece.static-anchor { cursor: default; background: rgba(255,255,255,0.02); color: var(--text-secondary); border-style: dashed; }
        .piece.static-anchor:hover { transform: none; box-shadow: none; background: rgba(255,255,255,0.02); }
        .piece:not(.static-anchor):hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }

        .piece i { margin-right: 14px; flex-shrink: 0; color: var(--primary); }
        .sortable-ghost { opacity: 0.2; background: var(--primary) !important; }

        .controls { margin-top: 35px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        button { padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 1rem; font-family: inherit; transition: all 0.2s; }
        .primary-btn { background: var(--primary); color: white; width: 100%; }
        .submit-btn { background: var(--success); color: white; flex: 2; min-width: 150px; }
        .reset-btn { background: var(--neutral-btn); color: var(--text-primary); flex: 1; }
        .reveal-btn { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.4); width: 100%; margin-top: 12px; display: none; }
        
        button:hover { transform: translateY(-1px); filter: brightness(1.1); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; filter: none; }

        #result-box { margin-top: 30px; padding: 20px; border-radius: 14px; display: none; line-height: 1.6; font-size: 0.95rem; border: 1px solid transparent; }

        @media (max-width: 768px) {
            .container { padding: 25px 15px; border-radius: 16px; }
            h1 { font-size: 1.6rem; }
            .game-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .piece { padding: 10px 12px; font-size: 0.8rem; margin: 8px 0; border-radius: 8px; }
            .piece i { margin-right: 8px; width: 14px; height: 14px; }
            .controls { flex-direction: column; gap: 10px; }
            .submit-btn, .reset-btn { width: 100%; flex: none; }
        }

        @media (max-width: 480px) {
            .game-grid { gap: 6px; }
            .piece { padding: 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <img id="brandLogo" class="logo" src="" alt="Corporate Branding">
        <h1 id="gameTitle">Challenge Arena</h1>
        <p class="subtitle" id="gameSubtitle">Enter your tracking information records below to step into the puzzle track.</p>

        <!-- Access Registration Screen -->
        <div id="welcomeScreen" class="setup-box">
            <input type="text" id="teamIdentifier" placeholder="Enter Team Name / Number">
            <button class="primary-btn" onclick="initializeGameSession()">Launch Assessment Arena</button>
        </div>

        <!-- Dynamic Game Arena -->
        <div id="gameArena" style="display:none;">
            <div id="sequenceWrapper" class="piece-list"></div>

            <div id="matchingWrapper" class="game-grid" style="display:none;">
                <div>
                    <div class="column-title">Permanent Items</div>
                    <div id="staticColumn"></div>
                </div>
                <div>
                    <div class="column-title">Draggable Matches</div>
                    <div id="draggableColumn" class="piece-list"></div>
                </div>
            </div>

            <div class="controls">
                <button id="resetBtn" class="reset-btn" onclick="resetArena()">Reset</button>
                <button id="submitBtn" class="submit-btn" onclick="evaluateSubmission()">Submit Verification</button>
                <button id="revealBtn" class="reveal-btn" onclick="displaySolutionBlueprint()">View System Solution Guide</button>
            </div>
            
            <div id="result-box"></div>
        </div>
    </div>

    <script>
        let config = null;
        let parsedDataset = [];
        let gameLocked = false;
        let sortInstance = null;

        // Unified Symmetrical Base64 Decoding Pipeline Matrix
        (function unpackUrlParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedPayload = urlParams.get('p');
            if(!encryptedPayload) {
                document.getElementById('gameTitle').innerText = "Configuration Missing";
                document.getElementById('gameSubtitle').innerText = "Please trace access directly using a secure link emitted via the Studio console.";
                document.getElementById('welcomeScreen').style.display = 'none';
                return;
            }
            try {
                // Decodes standard and special URI payload strings smoothly
                config = JSON.parse(decodeURIComponent(escape(atob(encryptedPayload))));
                applyBrandingTokens(config);
            } catch(err) {
                console.error("Payload compilation interrupt context:", err);
                document.getElementById('gameTitle').innerText = "Payload Damage Error";
                document.getElementById('gameSubtitle').innerText = "Failed to unpack training module variables string securely. Re-export a clean code block from your Studio window.";
                document.getElementById('welcomeScreen').style.display = 'none';
            }
        })();

        function applyBrandingTokens(cfg) {
            document.body.style.fontFamily = cfg.f;
            document.body.style.background = `linear-gradient(135deg, ${cfg.c1} 0%, ${cfg.c2} 100%)`;
            
            const container = document.getElementById('mainContainer');
            container.style.color = cfg.ct;
            container.style.setProperty('--primary', cfg.ca);
            
            if(cfg.l) {
                const img = document.getElementById('brandLogo');
                img.src = cfg.l;
                img.style.display = 'block';
            }

            if(cfg.m === "sequence") {
                document.getElementById('gameTitle').innerText = "Sequence Puzzle";
                document.getElementById('gameSubtitle').innerText = "Drag elements into correct structural running order.";
            } else {
                document.getElementById('gameTitle').innerText = "Matrix Alignment Challenge";
                document.getElementById('gameSubtitle').innerText = "Match items in the draggable right column directly adjacent to its correct anchor prompt.";
            }

            parsedDataset = cfg.d.split('\n').map(line => {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    return { id: parts[0].trim(), text: parts.slice(1).join(',').trim() };
                }
                return null;
            }).filter(i => i !== null);
        }

        function initializeGameSession() {
            const trackingName = document.getElementById('teamIdentifier').value.trim();
            if(!trackingName) { alert("Please input a participant or team logging identifier record."); return; }

            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';

            buildPuzzleArena();
        }

        function buildPuzzleArena() {
            const isSeq = config.m === "sequence";
            const targetContainerId = isSeq ? 'sequenceWrapper' : 'draggableColumn';
            const container = document.getElementById(targetContainerId);
            container.innerHTML = '';

            if(!isSeq) {
                document.getElementById('mainContainer').classList.add('wide-layout');
                document.getElementById('matchingWrapper').style.display = 'grid';
                
                const staticBox = document.getElementById('staticColumn');
                staticBox.innerHTML = '';
                parsedDataset.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'piece static-anchor';
                    div.innerHTML = `<span>${item.id}</span>`;
                    staticBox.appendChild(div);
                });
            }

            let scrambled = [...parsedDataset].sort(() => Math.random() - 0.5);
            scrambled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'piece';
                div.setAttribute('data-id', item.id);
                div.innerHTML = `<i data-lucide="${isSeq ? 'layers' : 'move'}" style="color:${config.ca}"></i><span>${item.text}</span>`;
                container.appendChild(div);
            });

            sortInstance = new Sortable(container, {
                animation: 200,
                ghostClass: 'sortable-ghost',
                onStart: function() { if(gameLocked) return false; }
            });
            lucide.createIcons();
        }

        function evaluateSubmission() {
            if(gameLocked) return;
            gameLocked = true;
            sortInstance.option("disabled", true);

            const isSeq = config.m === "sequence";
            const selectorStr = isSeq ? '#sequenceWrapper .piece' : '#draggableColumn .piece';
            const elements = Array.from(document.querySelectorAll(selectorStr));
            
            let accumulatedScore = 0;
            let maxScore = parsedDataset.length;

            elements.forEach((card, idx) => {
                const trackingId = card.getAttribute('data-id');
                const baselineId = parsedDataset[idx].id;
                const icon = card.querySelector('i');

                if(trackingId === baselineId) {
                    accumulatedScore++;
                    card.style.backgroundColor = "rgba(16, 185, 129, 0.15)";
                    card.style.borderColor = "var(--success)";
                    if(icon) icon.style.color = "var(--success)";
                } else {
                    card.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
                    card.style.borderColor = "var(--error)";
                    if(icon) icon.style.color = "var(--error)";
                }
            });

            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';

            const feedbackArea = document.getElementById('result-box');
            feedbackArea.style.display = 'block';
            const participant = document.getElementById('teamIdentifier').value.trim();

            if(accumulatedScore === maxScore) {
                feedbackArea.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                feedbackArea.style.borderColor = "rgba(16, 185, 129, 0.2)";
                feedbackArea.innerHTML = `<b style="color:var(--success)">Perfect ${accumulatedScore}/${maxScore}!</b><br>Brilliant work, ${participant}! Everything aligns correctly.`;
            } else {
                feedbackArea.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                feedbackArea.style.borderColor = "rgba(239, 68, 68, 0.2)";
                feedbackArea.innerHTML = `<b style="color:var(--error)">Score: ${accumulatedScore}/${maxScore}</b><br>Verification failed. Review system architecture guides below.`;
                document.getElementById('revealBtn').style.display = 'block';
            }

            transmitMetricsTelemetry(participant, `${accumulatedScore}/${maxScore}`);
        }

        function displaySolutionBlueprint() {
            const isSeq = config.m === "sequence";
            const elementBoxId = isSeq ? 'sequenceWrapper' : 'draggableColumn';
            const box = document.getElementById(elementBoxId);
            box.innerHTML = '';

            parsedDataset.forEach(item => {
                const div = document.createElement('div');
                div.className = 'piece';
                div.style.backgroundColor = "rgba(99, 102, 241, 0.15)";
                div.style.borderColor = "var(--blueprint)";
                div.innerHTML = `<i data-lucide="check-circle" style="color:var(--blueprint)"></i><span>${item.text}</span>`;
                box.appendChild(div);
            });
            
            document.getElementById('revealBtn').style.display = 'none';
            lucide.createIcons();
        }

        function resetArena() {
            gameLocked = false;
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').style.display = 'inline-block';
            document.getElementById('revealBtn').style.display = 'none';
            document.getElementById('result-box').style.display = 'none';
            buildPuzzleArena();
        }

        async function transmitMetricsTelemetry(user, outputScore) {
            const targetAppScriptUrl = "https://script.google.com/macros/s/AKfycby3J-PlUKb54PFpr8XYeqPXODZuoYqxUetbsL90z_QPkwb8oy0JZ1gWxR2IjDJPsSzv/exec";
            fetch(targetAppScriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ team: user, score: outputScore })
            }).catch(e => console.error("Data tracking capture exception metrics:", e));
        }
    </script>
</body>
</html>
