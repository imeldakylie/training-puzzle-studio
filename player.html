<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified Learning Challenge</title>
    
    <!-- Design Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg-start: #0f172a;
            --bg-end: #1e1e38;
            --accent: #3b82f6;
            --text-color: #f8fafc;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-color);
            display: flex; justify-content: center; align-items: flex-start;
            box-sizing: border-box; padding: 20px 15px;
        }

        .player-card {
            width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px;
        }

        .brand-logo { 
            max-width: 180px; max-height: 65px; object-fit: contain; margin: 0 auto; display: none; 
        }

        .header-section { text-align: center; }
        .header-title { font-size: 1.6rem; font-weight: 700; margin: 0 0 6px 0; letter-spacing: -0.02em; }
        .header-sub { font-size: 0.88rem; opacity: 0.8; margin: 0; line-height: 1.4; }

        /* Game Containers */
        .puzzle-arena { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        
        .matching-split {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative;
        }
        .matching-column { display: flex; flex-direction: column; gap: 8px; }

        .game-piece {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); padding: 14px;
            border-radius: 12px; font-size: 0.88rem; font-weight: 500; display: flex; align-items: center; gap: 10px;
            cursor: grab; word-break: break-word; line-height: 1.35; box-sizing: border-box; transition: background 0.2s, border 0.2s;
        }
        .game-piece:active { cursor: grabbing; }
        .game-piece.static-anchor { border-style: dashed; background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6); cursor: default; }

        /* Sortable Class Placeholders */
        .sortable-ghost { opacity: 0.3; background: var(--accent) !important; }
        .sortable-chosen { border-color: var(--accent); }

        /* Control Buttons */
        .action-tray { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn {
            border: none; border-radius: 10px; padding: 12px; font-size: 0.92rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }

        /* Alert Panel */
        .alert-panel {
            border-radius: 10px; padding: 15px; font-size: 0.88rem; line-height: 1.45;
            display: none; align-items: flex-start; gap: 10px; font-weight: 500;
        }
        .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #10b981; }
        .alert-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; }

        /* Solution Guide Sheet */
        .solution-sheet {
            background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px;
            padding: 15px; display: none; flex-direction: column; gap: 10px; margin-top: 5px;
        }
        .solution-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; opacity: 0.6; letter-spacing: 0.05em; }
        .solution-list { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; line-height: 1.4; padding-left: 20px; margin: 0; }
    </style>
</head>
<body>

    <div class="player-card">
        <img id="playerLogo" class="brand-logo" src="" alt="">
        
        <div class="header-section">
            <h1 id="playerTitle" class="header-title"></h1>
            <p id="playerSubtitle" class="header-sub"></p>
        </div>

        <!-- Single sequence layout list -->
        <div id="sequenceArena" class="puzzle-arena" style="display: none;"></div>

        <!-- Matching matrix layout split -->
        <div id="matchingArena" class="matching-split" style="display: none;">
            <div class="matching-column" id="staticColumn"></div>
            <div class="matching-column" id="sortableColumn"></div>
        </div>

        <div class="action-tray">
            <button class="btn btn-primary" id="btnSubmit" onclick="evaluateUserAnswer()"></button>
            
            <div id="alertBox" class="alert-panel">
                <i id="alertIcon" data-lucide="info" style="flex-shrink:0;"></i>
                <span id="alertText"></span>
            </div>

            <button class="btn btn-secondary" id="btnReveal" onclick="toggleSolutionSheet()"></button>
            <button class="btn btn-secondary" id="btnReset" onclick="resetActivityState()">
                <i data-lucide="rotate-ccw" style="width:16px; height:16px;"></i> Reset Game
            </button>
        </div>

        <div class="solution-sheet" id="solutionSheet">
            <div class="solution-title">Official Architecture Reference Guide</div>
            <ol class="solution-list" id="solutionList"></ol>
        </div>
    </div>

    <script>
        let config = {};
        let parsedDataset = [];
        let sortableInstance = null;

        window.addEventListener('DOMContentLoaded', () => {
            loadDecodedPayload();
            renderGameElements();
            safeRenderIcons();
        });

        function safeRenderIcons() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                lucide.createIcons();
            }
        }

        function loadDecodedPayload() {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p');
            if (!p) {
                document.body.innerHTML = `<div style="text-align:center; padding-top:40px; font-family:sans-serif;"><h3>Error: No configuration payload detected.</h3></div>`;
                return;
            }

            try {
                const decoded = decodeURIComponent(escape(atob(p)));
                const payload = decoded.split('^');
                
                config = {
                    mode: payload[0],
                    csvData: payload[1],
                    logoUrl: payload[2],
                    fontFace: payload[3],
                    colorBgStart: payload[4],
                    colorBgEnd: payload[5],
                    colorAccent: payload[6],
                    colorText: payload[7],
                    title: payload[8],
                    subtitle: payload[9],
                    lblSubmit: payload[10],
                    lblReveal: payload[11],
                    msgSuccess: payload[12],
                    msgFailure: payload[13]
                };

                // Apply Global Styling Matrices
                document.documentElement.style.setProperty('--bg-start', config.colorBgStart);
                document.documentElement.style.setProperty('--bg-end', config.colorBgEnd);
                document.documentElement.style.setProperty('--accent', config.colorAccent);
                document.documentElement.style.setProperty('--text-color', config.colorText);
                document.body.style.fontFamily = config.fontFace;

                // Set logo and texts
                const logo = document.getElementById('playerLogo');
                if(config.logoUrl) { logo.src = config.logoUrl; logo.style.display = 'block'; }
                document.getElementById('playerTitle').innerText = config.title;
                document.getElementById('playerSubtitle').innerText = config.subtitle;
                document.getElementById('btnSubmit').innerText = config.lblSubmit;
                document.getElementById('btnReveal').innerText = config.lblReveal;

                // Parse CSV rows safely
                config.csvData.split('\n').forEach((line) => {
                    const parts = line.split(',');
                    if(parts.length >= 2) {
                        parsedDataset.push({
                            id: parts[0].trim(),
                            value: parts[1].trim()
                        });
                    }
                });

            } catch (e) {
                console.error(e);
                document.body.innerHTML = `<div style="text-align:center; padding-top:40px; font-family:sans-serif;"><h3>Error reading configurations or invalid URL data.</h3></div>`;
            }
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function renderGameElements() {
            const seqArena = document.getElementById('sequenceArena');
            const matchArena = document.getElementById('matchingArena');
            const solList = document.getElementById('solutionList');

            seqArena.innerHTML = '';
            solList.innerHTML = '';

            // Populate static answer keys
            parsedDataset.forEach(item => {
                const li = document.createElement('li');
                if(config.mode === 'sequence') {
                    li.innerText = item.value;
                } else {
                    li.innerHTML = `<strong>${item.id}</strong> — ${item.value}`;
                }
                solList.appendChild(li);
            });

            if (config.mode === "sequence") {
                seqArena.style.display = 'flex';
                matchArena.style.display = 'none';

                let shuffled = shuffle([...parsedDataset]);
                shuffled.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'game-piece';
                    div.setAttribute('data-id', item.id);
                    div.innerHTML = `<i data-lucide="layers" style="color:var(--accent); width:18px; height:18px; flex-shrink:0;"></i><span>${item.value}</span>`;
                    seqArena.appendChild(div);
                });

                sortableInstance = new Sortable(seqArena, {
                    animation: 180,
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen'
                });

            } else {
                seqArena.style.display = 'none';
                matchArena.style.display = 'grid';

                const staticCol = document.getElementById('staticColumn');
                const sortableCol = document.getElementById('sortableColumn');
                staticCol.innerHTML = '';
                sortableCol.innerHTML = '';

                // Left Static Anchors in original order
                parsedDataset.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'game-piece static-anchor';
                    div.innerHTML = `<span>${item.id}</span>`;
                    staticCol.appendChild(div);
                });

                // Right Draggable Pieces shuffled
                let shuffled = shuffle([...parsedDataset]);
                shuffled.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'game-piece';
                    div.setAttribute('data-id', item.id);
                    div.innerHTML = `<i data-lucide="move" style="color:var(--accent); width:16px; height:16px; flex-shrink:0;"></i><span>${item.value}</span>`;
                    sortableCol.appendChild(div);
                });

                sortableInstance = new Sortable(sortableCol, {
                    animation: 180,
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen',
                    onEnd: syncMatrixHeights
                });

                setTimeout(syncMatrixHeights, 50);
            }
        }

        function syncMatrixHeights() {
            if (config.mode !== 'matching') return;
            const staticPieces = document.querySelectorAll('#staticColumn .game-piece');
            const sortedPieces = document.querySelectorAll('#sortableColumn .game-piece');
            
            staticPieces.forEach((item, index) => {
                if (sortedPieces[index]) {
                    item.style.height = 'auto';
                    sortedPieces[index].style.height = 'auto';
                    const maxH = Math.max(item.offsetHeight, sortedPieces[index].offsetHeight);
                    item.style.height = maxH + 'px';
                    sortedPieces[index].style.height = maxH + 'px';
                }
            });
        }

        function evaluateUserAnswer() {
            const alertBox = document.getElementById('alertBox');
            const alertText = document.getElementById('alertText');
            const alertIcon = document.getElementById('alertIcon');
            let isCorrect = true;

            if (config.mode === 'sequence') {
                const currentPieces = document.querySelectorAll('#sequenceArena .game-piece');
                currentPieces.forEach((piece, idx) => {
                    const pieceId = piece.getAttribute('data-id');
                    if(parsedDataset[idx].id !== pieceId) {
                        isCorrect = false;
                    }
                });
            } else {
                const currentDraggables = document.querySelectorAll('#sortableColumn .game-piece');
                currentDraggables.forEach((piece, idx) => {
                    const pieceId = piece.getAttribute('data-id');
                    if(parsedDataset[idx].id !== pieceId) {
                        isCorrect = false;
                    }
                });
            }

            alertBox.style.display = 'flex';
            if (isCorrect) {
                alertBox.className = "alert-panel alert-success";
                alertText.innerText = config.msgSuccess;
                alertIcon.setAttribute('data-lucide', 'check-circle');
            } else {
                alertBox.className = "alert-panel alert-danger";
                alertText.innerText = config.msgFailure;
                alertIcon.setAttribute('data-lucide', 'x-circle');
            }
            safeRenderIcons();
        }

        function toggleSolutionSheet() {
            const sheet = document.getElementById('solutionSheet');
            if (sheet.style.display === 'flex') {
                sheet.style.display = 'none';
            } else {
                sheet.style.display = 'flex';
                sheet.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetActivityState() {
            document.getElementById('alertBox').style.display = 'none';
            document.getElementById('solutionSheet').style.display = 'none';
            renderGameElements();
            safeRenderIcons();
        }

        window.addEventListener('resize', syncMatrixHeights);
    </script>
</body>
</html>
